<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect width="320" height="320" fill="#8fd3ff"/>

  <!-- Tail -->
  <rect x="40" y="140" width="20" height="20" fill="#5b3a29"/>
  <rect x="60" y="120" width="20" height="20" fill="#5b3a29"/>

  <!-- Body -->
  <rect x="80" y="120" width="20" height="20" fill="#d9a066"/>
  <rect x="100" y="120" width="20" height="20" fill="#d9a066"/>
  <rect x="120" y="120" width="20" height="20" fill="#d9a066"/>
  <rect x="140" y="120" width="20" height="20" fill="#d9a066"/>
  <rect x="160" y="120" width="20" height="20" fill="#d9a066"/>

  <rect x="80" y="140" width="20" height="20" fill="#d9a066"/>
  <rect x="100" y="140" width="20" height="20" fill="#f2c185"/>
  <rect x="120" y="140" width="20" height="20" fill="#f2c185"/>
  <rect x="140" y="140" width="20" height="20" fill="#f2c185"/>
  <rect x="160" y="140" width="20" height="20" fill="#d9a066"/>

  <rect x="80" y="160" width="20" height="20" fill="#d9a066"/>
