  <!-- Legs -->
  <rect x="90" y="180" width="20" height="40" fill="#5b3a29"/>
  <rect x="150" y="180" width="20" height="40" fill="#5b3a29"/>

  <!-- Head -->
  <rect x="180" y="80" width="20" height="20" fill="#d9a066"/>
  <rect x="200" y="80" width="20" height="20" fill="#d9a066"/>
  <rect x="220" y="80" width="20" height="20" fill="#d9a066"/>

  <rect x="160" y="100" width="20" height="20" fill="#5b3a29"/>
  <rect x="180" y="100" width="20" height="20" fill="#f2c185"/>
  <rect x="200" y="100" width="20" height="20" fill="#f2c185"/>
  <rect x="220" y="100" width="20" height="20" fill="#f2c185"/>
  <rect x="240" y="100" width="20" height="20" fill="#5b3a29"/>

  <rect x="160" y="120" width="20" height="20" fill="#5b3a29"/>
  <rect x="180" y="120" width="20" height="20" fill="#f2c185"/>
  <rect x="200" y="120" width="20" height="20" fill="#ffffff"/>
  <rect x="220" y="120" width="20" height="20" fill="#ffffff"/>
  <rect x="240" y="120" width="20" height="20" fill="#5b3a29"/>

  <rect x="160" y="140" width="20" height="20" fill="#d9a066"/>
  <rect x="180" y="140" width="20" height="20" fill="#f2c185"/>
  <rect x="200" y="140" width="20" height="20" fill="#000000"/>
  <rect x="220" y="140" width="20" height="20" fill="#000000"/>
  <rect x="240" y="140" width="20" height="20" fill="#d9a066"/>

  <!-- Nose -->
